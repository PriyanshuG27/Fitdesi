<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Backlight Glow Filter -->
    <filter id="orange-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="36" result="blur" />
      <feComponentTransfer in="blur" result="boost">
        <feFuncA type="linear" slope="1.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="boost" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Base (True OLED Black) -->
  <rect width="512" height="512" rx="112" fill="#080808" stroke="#1A1A1A" stroke-width="4"/>

  <!-- Glowing Aura Layer -->
  <g filter="url(#orange-glow)">
    <!-- Aura Source (Orange colored circle behind the Z) -->
    <circle cx="256" cy="256" r="80" fill="#FF5C00" opacity="0.45" />
    
    <!-- 3D Extrusion Side Shadows (True Neubrutalist offset) -->
    <g transform="translate(16, 16)" opacity="0.95">
      <path d="M 160,130 L 352,130 L 224,288 L 352,288 L 192,390 L 160,390 L 288,230 L 160,230 Z" fill="#00D4FF"/>
    </g>
    
    <!-- Main Z Face (Burnt Orange with bold structure) -->
    <path d="M 160,130 L 352,130 L 224,288 L 352,288 L 192,390 L 160,390 L 288,230 L 160,230 Z" 
          fill="#FF5C00" 
          stroke="#080808" 
          stroke-width="12" 
          stroke-linejoin="round"/>
          
    <!-- Crisp White Highlight Line -->
    <path d="M 175,145 L 325,145" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>