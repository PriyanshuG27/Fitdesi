<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card (OLED Black) -->
  <rect width="512" height="512" rx="32" fill="#080808"/>

  <!-- Steel Rebar Z Group -->
  <g transform="translate(10, 10)">
    
    <!-- 1. Neubrutalist Offset Block Shadow (Solid Black) -->
    <path d="M 140,150 H 372 L 180,342 H 372" 
          fill="none" 
          stroke="#000000" 
          stroke-width="52" 
          stroke-linecap="square" 
          stroke-linejoin="miter"
          transform="translate(16, 16)"/>
          
    <!-- 2. Dark Iron Base Core -->
    <path d="M 140,150 H 372 L 180,342 H 372" 
          fill="none" 
          stroke="#2A2A2A" 
          stroke-width="48" 
          stroke-linecap="square" 
          stroke-linejoin="miter"/>

    <!-- 3. Mid-tone Steel Layer -->
    <path d="M 140,150 H 372 L 180,342 H 372" 
          fill="none" 
          stroke="#555555" 
          stroke-width="38" 
          stroke-linecap="square" 
          stroke-linejoin="miter"/>

    <!-- 4. Rebar Structural Ribs (Repeated diagonal lines representing steel rebar traction ribs) -->
    <!-- Top Horizontal Ribs -->
    <g stroke="#2A2A2A" stroke-width="4">
      <line x1="160" y1="138" x2="168" y2="162" />
      <line x1="190" y1="138" x2="198" y2="162" />
      <line x1="220" y1="138" x2="228" y2="162" />
      <line x1="250" y1="138" x2="258" y2="162" />
      <line x1="280" y1="138" x2="288" y2="162" />
      <line x1="310" y1="138" x2="318" y2="162" />
      <line x1="340" y1="138" x2="348" y2="162" />
      
      <!-- Bottom Horizontal Ribs -->
      <line x1="190" y1="330" x2="198" y2="354" />
      <line x1="220" y1="330" x2="228" y2="354" />
      <line x1="250" y1="330" x2="258" y2="354" />
      <line x1="280" y1="330" x2="288" y2="354" />
      <line x1="310" y1="330" x2="318" y2="354" />
      <line x1="340" y1="330" x2="348" y2="354" />
    </g>

    <!-- Diagonal Ribs (Spanning down-left) -->
    <g stroke="#2A2A2A" stroke-width="4">
      <line x1="340" y1="170" x2="362" y2="178" />
      <line x1="320" y1="190" x2="342" y2="198" />
      <line x1="300" y1="210" x2="322" y2="218" />
      <line x1="280" y1="230" x2="302" y2="238" />
      <line x1="260" y1="250" x2="282" y2="258" />
      <line x1="240" y1="270" x2="262" y2="278" />
      <line x1="220" y1="290" x2="242" y2="298" />
      <line x1="200" y1="310" x2="222" y2="318" />
    </g>

    <!-- 5. Bright Orange Core Energy / Heat highlights (Bent friction zone) -->
    <!-- Top Bend Orange Spark -->
    <path d="M 320,150 L 372,150 L 330,192" 
          fill="none" 
          stroke="#FF5C00" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- Bottom Bend Orange Spark -->
    <path d="M 220,342 L 180,342 L 202,320" 
          fill="none" 
          stroke="#FF5C00" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <!-- 6. Steel Edge Light Highlight (Giving 3D tube structure) -->
    <path d="M 140,140 H 372 L 180,332 H 372" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="4" 
          stroke-linecap="square" 
          stroke-linejoin="miter" 
          opacity="0.8"/>
  </g>
</svg>
