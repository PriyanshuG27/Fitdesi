<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <!-- Background (OLED Dark Card) -->
  <rect width="800" height="220" rx="24" fill="#080808"/>
  
  <!-- Left Side: Mini Neubrutalist Spark Icon -->
  <g transform="translate(40, 20) scale(0.35)">
    <!-- Cyan Shadow -->
    <polygon points="175,85 395,85 245,255 415,255 135,455 215,285 115,285" 
             fill="#00D4FF" 
             stroke="#080808" 
             stroke-width="16" 
             stroke-linejoin="miter"/>
             
    <!-- Orange Face -->
    <polygon points="160,70 380,70 230,240 400,240 120,440 200,270 100,270" 
             fill="#FF5C00" 
             stroke="#080808" 
             stroke-width="16" 
             stroke-linejoin="miter"/>

    <!-- Inner White Highlight -->
    <polyline points="190,95 345,95 245,210" 
              fill="none" 
              stroke="#FFF" 
              stroke-width="8" 
              opacity="0.85"/>
  </g>

  <!-- Right Side: Custom Typographic "ZENKAI" Wordmark -->
  <g transform="translate(230, 0)">
    <!-- Z (Orange Accent Highlight) -->
    <path d="M 30,50 H 100 V 75 L 55,125 H 100 V 150 H 30 V 125 L 75,75 H 30 Z" 
          fill="#FF5C00" 
          stroke="#080808" 
          stroke-width="4" 
          stroke-linejoin="miter"/>

    <!-- E -->
    <path d="M 120,50 H 180 V 75 H 150 V 88 H 175 V 112 H 150 V 125 H 180 V 150 H 120 Z" 
          fill="#F0F0F0" 
          stroke="#080808" 
          stroke-width="4" 
          stroke-linejoin="miter"/>

    <!-- N -->
    <path d="M 200,50 H 225 L 250,110 V 50 H 275 V 150 H 250 L 225,90 V 150 H 200 Z" 
          fill="#F0F0F0" 
          stroke="#080808" 
          stroke-width="4" 
          stroke-linejoin="miter"/>

    <!-- K -->
    <path d="M 295,50 H 320 V 90 L 345,50 H 375 L 335,100 L 375,150 H 345 L 320,110 V 150 H 295 Z" 
          fill="#F0F0F0" 
          stroke="#080808" 
          stroke-width="4" 
          stroke-linejoin="miter"/>

    <!-- A -->
    <path d="M 400,50 H 430 L 460,150 H 433 L 427,125 H 403 L 397,150 H 370 Z" 
          fill="#F0F0F0" 
          stroke="#080808" 
          stroke-width="4" 
          stroke-linejoin="miter"/>
    <!-- A Inner Cutout -->
    <polygon points="415,75 407,105 423,105" fill="#080808"/>

    <!-- I -->
    <path d="M 480,50 H 505 V 150 H 480 Z" 
          fill="#F0F0F0" 
          stroke="#080808" 
          stroke-width="4" 
          stroke-linejoin="miter"/>

    <!-- Tagline (Using app's native fonts) -->
    <text x="3" 
          y="185" 
          font-family="Outfit, sans-serif" 
          font-size="14.5" 
          font-weight="600" 
          letter-spacing="0.28em" 
          fill="#888888">
      TRAIN SMARTER. <tspan fill="#FF5C00">COME BACK STRONGER.</tspan>
    </text>
  </g>
</svg>
