<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card (OLED Black) -->
  <rect width="512" height="512" rx="32" fill="#080808"/>

  <!-- Studio Trigger Style Geometric Power Aura (Fiery angular polygons) -->
  <g transform="translate(256, 256) scale(0.95)">
    
    <!-- Outer Aura Layer 1 (Electric Cyan Flame Shards) -->
    <g fill="#00D4FF">
      <polygon points="0,-180 40,-130 90,-160 70,-100 130,-120 90,-70 150,-50 90,-20 120,30 60,10 80,80 30,50 40,120 0,80"/>
      <polygon points="0,180 -40,130 -90,160 -70,100 -130,120 -90,70 -150,50 -90,20 -120,-30 -60,-10 -80,-80 -30,-50 -40,-120 0,-80"/>
    </g>

    <!-- Outer Aura Layer 2 (Burnt Orange Flame Shards - Rotated/Offset) -->
    <g fill="#FF5C00" opacity="0.9" transform="scale(0.85) rotate(15)">
      <polygon points="0,-180 45,-120 100,-150 70,-90 140,-100 85,-50 160,-20 90,0 110,60 50,30 60,110 10,70 -20,130 -30,60"/>
      <polygon points="0,180 -45,120 -100,150 -70,90 -140,100 -85,50 -160,20 -90,0 -110,60 -50,30 -60,110 -10,70 20,130 30,60"/>
    </g>

    <!-- Inner Aura Core (Acid Lime Sparks) -->
    <g fill="#B5FF2D" opacity="0.95" transform="scale(0.65)">
      <polygon points="0,-180 50,-110 120,-130 80,-60 150,-60 80,0 120,80 40,40 40,130 -20,60 -80,120 -60,40 -120,10 -50,-10"/>
    </g>

    <!-- Foreground Z (Crisp, Heavy White Plate with thick black borders) -->
    <!-- Shadow offset for Z -->
    <path d="M -90,-100 H 90 L -50,70 H 90 V 110 H -90 L 50,-60 H -90 Z" 
          fill="#080808" 
          transform="translate(10, 10)"/>
    
    <!-- Face of Z -->
    <path d="M -90,-100 H 90 L -50,70 H 90 V 110 H -90 L 50,-60 H -90 Z" 
          fill="#FFFFFF" 
          stroke="#080808" 
          stroke-width="12" 
          stroke-linejoin="miter"/>

    <!-- Inside Accent Line -->
    <path d="M -75,-85 H 65" stroke="#FF5C00" stroke-width="6" stroke-linecap="square"/>
  </g>
</svg>
