<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="#080808"/>

  <g transform="translate(256, 256)">
    <!-- Base Weight Plate Outer Shadow -->
    <circle cx="5" cy="5" r="195" fill="#030303" />

    <!-- Heavy Cast-Iron Gym Plate (Textured) -->
    <circle cx="0" cy="0" r="190" fill="#181818" stroke="#333333" stroke-width="12"/>
    <circle cx="0" cy="0" r="145" fill="none" stroke="#222222" stroke-width="4" stroke-dasharray="10 12"/>

    <!-- Cast-Iron Plate Labels (Manga Blocky Lettering) -->
    <text x="0" y="-155" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="16" fill="#444" text-anchor="middle" letter-spacing="0.2em">ZENKAI ATHLETICS</text>
    <text x="0" y="165" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="16" fill="#444" text-anchor="middle" letter-spacing="0.2em">25 KG</text>

    <!-- Heavy Fractures / Crack Lines (Shattering the plate) -->
    <g stroke="#080808" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 0,0 L -110,-110 L -160,-100 M -110,-110 L -90,-150" />
      <path d="M 0,0 L 130,-100 L 170,-150 M 130,-100 L 175,-70" />
      <path d="M 0,0 L 40,120 L 70,165 M 40,120 L 10,170" />
      <path d="M 0,0 L -120,60 L -175,80 M -120,60 L -130,110" />
    </g>
    <!-- Overlaying Crisp White Crack Lines -->
    <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 0,0 L -110,-110 L -160,-100 M -110,-110 L -90,-150" />
      <path d="M 0,0 L 130,-100 L 170,-150 M 130,-100 L 175,-70" />
      <path d="M 0,0 L 40,120 L 70,165 M 40,120 L 10,170" />
      <path d="M 0,0 L -120,60 L -175,80 M -120,60 L -130,110" />
    </g>

    <!-- Center Sleeve Hole -->
    <circle cx="0" cy="0" r="32" fill="#080808" stroke="#333" stroke-width="4"/>

    <!-- Jagged Explosive Z (Burnt Orange with thick borders) -->
    <path d="M -80,-90 
             H 60 
             L -40,10 
             H 50 
             L -70,90 
             L -40,40 
             H -90 
             L 20,-40 
             H -50 
             Z" 
          fill="#FF5C00" 
          stroke="#FFFFFF" 
          stroke-width="6" 
          stroke-linejoin="miter"
          transform="scale(1.2)"/>
  </g>
</svg>
