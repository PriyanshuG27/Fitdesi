<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card (Pure OLED Black) -->
  <rect width="512" height="512" rx="32" fill="#080808"/>
  
  <defs>
    <!-- Soft Aurora Gradient Blobs -->
    <radialGradient id="aurora-orange" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FF5C00" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#FF5C00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="aurora-cyan" cx="60%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>

    <!-- Glowing Node Filter -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Aurora Backlight Blobs -->
  <circle cx="200" cy="200" r="180" fill="url(#aurora-orange)" />
  <circle cx="312" cy="312" r="180" fill="url(#aurora-cyan)" />

  <!-- Wireframe Z Structure -->
  <g transform="translate(0, 0)">
    <!-- Behind-shadow Line (Cyan Tinted Offset) -->
    <polyline points="180,140 352,140 180,372 352,372" 
              fill="none" 
              stroke="#00D4FF" 
              stroke-width="3" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              opacity="0.35"
              transform="translate(10, 10)"/>

    <!-- Main Front Line (Crisp White) -->
    <polyline points="180,140 352,140 180,372 352,372" 
              fill="none" 
              stroke="#FFFFFF" 
              stroke-width="5" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              opacity="0.9"/>

    <!-- Geometric Grid Aligners (Sleek tech details) -->
    <line x1="180" y1="140" x2="180" y2="372" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6 8" opacity="0.15" />
    <line x1="352" y1="140" x2="352" y2="372" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6 8" opacity="0.15" />

    <!-- Glowing Vertex Nodes -->
    <!-- Node A (Top-Left) -->
    <circle cx="180" cy="140" r="8" fill="#FFFFFF" filter="url(#node-glow)"/>
    <circle cx="180" cy="140" r="4" fill="#FF5C00"/>

    <!-- Node B (Top-Right) -->
    <circle cx="352" cy="140" r="8" fill="#FFFFFF" filter="url(#node-glow)"/>
    <circle cx="352" cy="140" r="4" fill="#00D4FF"/>

    <!-- Node C (Bottom-Left) -->
    <circle cx="180" cy="372" r="8" fill="#FFFFFF" filter="url(#node-glow)"/>
    <circle cx="180" cy="372" r="4" fill="#00D4FF"/>

    <!-- Node D (Bottom-Right) -->
    <circle cx="352" cy="372" r="8" fill="#FFFFFF" filter="url(#node-glow)"/>
    <circle cx="352" cy="372" r="4" fill="#B5FF2D"/>
  </g>
</svg>
