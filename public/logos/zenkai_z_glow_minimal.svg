<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="#080808"/>
  
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="z-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5C00"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#B5FF2D"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="z-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Folded Ribbon Z Logo -->
  <g filter="url(#z-glow)" transform="translate(0, 0)">
    <!-- Main Ribbon Path -->
    <path d="M 140,150 
             H 372 
             L 190,320 
             H 372 
             V 362 
             H 140 
             L 322,192 
             H 140 
             Z" 
          fill="url(#z-gradient)" 
          stroke="#080808" 
          stroke-width="2" 
          stroke-linejoin="round"/>
          
    <!-- Subtle Inner Highlight Line (For glass/metal texture feel) -->
    <path d="M 155,165 H 350 L 195,305" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="4" 
          stroke-linecap="round" 
          opacity="0.3"/>
  </g>
</svg>
