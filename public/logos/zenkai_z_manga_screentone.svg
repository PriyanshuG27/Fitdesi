<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="#080808"/>
  
  <defs>
    <!-- Dynamic Manga Screentone Pattern (45-degree rotated dot grid) -->
    <pattern id="screentone-dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <!-- Orange dots on white background inside the Z -->
      <rect width="12" height="12" fill="#FFFFFF"/>
      <circle cx="6" cy="6" r="3.2" fill="#FF5C00" />
    </pattern>
  </defs>

  <!-- Manga Impact Blast Border -->
  <path d="M 40,40 L 472,40 L 472,472 L 40,472 Z" fill="none" stroke="#222" stroke-width="4" stroke-dasharray="16 12" />

  <!-- Logo Group -->
  <g transform="translate(10, 10)">
    
    <!-- Heavy Solid Offset Shadow (Classic Comic Book Silhouette) -->
    <path d="M 170,100 
             H 390 
             L 210,310 
             H 350 
             L 300,390 
             H 120 
             L 250,210 
             H 170 
             Z" 
          fill="#00D4FF" 
          stroke="#080808" 
          stroke-width="14" 
          stroke-linejoin="miter"
          transform="translate(16, 16)"/>

    <!-- Main Z Face (Screentone Pattern fill with bold outlines) -->
    <path d="M 170,100 
             H 390 
             L 210,310 
             H 350 
             L 300,390 
             H 120 
             L 250,210 
             H 170 
             Z" 
          fill="url(#screentone-dots)" 
          stroke="#080808" 
          stroke-width="14" 
          stroke-linejoin="miter"/>

    <!-- Sharp Action Splashes (Manga impact frames) -->
    <polygon points="120,80 140,110 100,120" fill="#FFFFFF" stroke="#080808" stroke-width="4"/>
    <polygon points="400,380 430,390 390,410" fill="#FFFFFF" stroke="#080808" stroke-width="4"/>
    <polygon points="380,80 395,115 365,110" fill="#FF5C00" stroke="#080808" stroke-width="4"/>
  </g>
</svg>
