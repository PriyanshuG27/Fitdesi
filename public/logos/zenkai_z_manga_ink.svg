<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card (OLED Black) -->
  <rect width="512" height="512" rx="32" fill="#080808"/>

  <!-- Manga Speed Lines Grid Backdrop (Radial center blast lines) -->
  <g stroke="#161616" stroke-width="1.5" opacity="0.7">
    <line x1="256" y1="256" x2="0" y2="0"/>
    <line x1="256" y1="256" x2="256" y2="0"/>
    <line x1="256" y1="256" x2="512" y2="0"/>
    <line x1="256" y1="256" x2="512" y2="256"/>
    <line x1="256" y1="256" x2="512" y2="512"/>
    <line x1="256" y1="256" x2="256" y2="512"/>
    <line x1="256" y1="256" x2="0" y2="512"/>
    <line x1="256" y1="256" x2="0" y2="256"/>
    <line x1="256" y1="256" x2="60" y2="120"/>
    <line x1="256" y1="256" x2="452" y2="120"/>
    <line x1="256" y1="256" x2="452" y2="392"/>
    <line x1="256" y1="256" x2="60" y2="392"/>
  </g>

  <g transform="translate(10, 10)">
    <!-- Raw Anime Speed Slashes (Manga speed lines) -->
    <!-- Slash 1 (Burnt Orange) -->
    <polygon points="380,210 210,360 220,368 390,218" fill="#FF5C00" opacity="0.9"/>
    <!-- Slash 2 (Acid Lime) -->
    <polygon points="290,140 160,260 166,266 296,146" fill="#B5FF2D" opacity="0.9"/>
    <!-- Slash 3 (Electric Cyan) -->
    <polygon points="350,260 240,380 244,386 354,266" fill="#00D4FF" opacity="0.9"/>

    <!-- Main Z - Ink Brush Slashes (Manga / Anime Calligraphy style) -->
    <!-- Top Slash (Burnt Orange with White Rim) -->
    <polygon points="120,130 380,150 340,195 150,185" fill="#FF5C00" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Main Center Slash (Pure White Heavy Ink) -->
    <polygon points="350,185 140,350 190,380 375,205" fill="#FFFFFF"/>
    
    <!-- Bottom Slash (Burnt Orange with White Rim) -->
    <polygon points="170,340 390,330 370,380 130,370" fill="#FF5C00" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>

    <!-- Dynamic Ink Splatters / Action Dots -->
    <circle cx="110" cy="200" r="6" fill="#FF5C00" />
    <circle cx="410" cy="310" r="5" fill="#FFFFFF" />
    <circle cx="390" cy="120" r="4" fill="#FFFFFF" />
    <circle cx="100" cy="360" r="8" fill="#FF5C00" />
  </g>
</svg>
