<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="#080808"/>
  
  <g transform="translate(10, 10)">
    <!-- Behind-the-scenes Calligraphy Splatters (Raw Ink) -->
    <path d="M 120,150 Q 110,180 130,190 T 170,170 Q 180,140 150,130 Z" fill="#FF5C00" opacity="0.3"/>
    <path d="M 370,330 Q 390,340 380,370 T 330,360 Q 340,320 370,330 Z" fill="#FFFFFF" opacity="0.2"/>

    <!-- The Z: Dynamic Jagged Brush Stroke (Calligraphy style with dry brush texture details) -->
    <!-- Top Stroke (Burnt Orange brush drag) -->
    <path d="M 115,160 
             C 140,145 180,140 240,142 
             C 280,143 330,145 375,150 
             C 385,151 395,160 385,170 
             C 370,185 330,192 280,188 
             C 240,185 180,182 145,185 
             C 125,187 110,175 115,160 Z" 
          fill="#FF5C00"/>

    <!-- Bottom Stroke (White brush drag) -->
    <path d="M 140,350 
             C 175,348 240,345 290,342 
             C 330,340 375,342 395,355 
             C 405,362 390,375 370,378 
             C 330,385 270,382 220,380 
             C 170,378 120,382 110,368 
             C 105,360 120,352 140,350 Z" 
          fill="#FFFFFF"/>

    <!-- Central Diagonal Brush Stroke (Heavy ink drag with rough ends) -->
    <path d="M 380,165 
             C 350,210 290,270 240,310 
             C 210,335 170,362 135,370 
             C 120,373 115,360 130,350 
             C 170,320 250,230 310,180 
             C 340,155 375,135 390,145 
             C 398,150 390,160 380,165 Z" 
          fill="#FFFFFF"/>

    <!-- Raw Splatters and Specks (Dry brush ink noise) -->
    <!-- Large Splatters -->
    <circle cx="395" cy="180" r="7" fill="#FF5C00"/>
    <circle cx="105" cy="340" r="5" fill="#FFFFFF"/>
    <circle cx="230" cy="270" r="4" fill="#FF5C00"/>
    <circle cx="270" cy="210" r="3" fill="#FFFFFF"/>
    
    <!-- Small Ink Dust -->
    <circle cx="390" cy="130" r="2" fill="#FFFFFF"/>
    <circle cx="410" cy="150" r="1.5" fill="#FF5C00"/>
    <circle cx="150" cy="135" r="2.5" fill="#FF5C00"/>
    <circle cx="85" cy="180" r="1.5" fill="#FFFFFF"/>
    <circle cx="120" cy="390" r="3" fill="#FFFFFF"/>
    <circle cx="320" cy="390" r="2" fill="#FF5C00"/>

    <!-- Raw Calligraphy Ink Bleed/Streak Lines -->
    <path d="M 230,142 Q 220,160 215,186" fill="none" stroke="#FF5C00" stroke-width="2" opacity="0.6"/>
    <path d="M 320,188 Q 300,240 280,270" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <path d="M 330,341 Q 345,360 350,376" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.6"/>
  </g>
</svg>
