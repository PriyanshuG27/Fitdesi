<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="#080808"/>
  
  <!-- Subtle Grid Texture (Neubrutalism Grid) -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#141414" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#grid)" rx="32"/>

  <!-- Logo Group -->
  <g transform="translate(16, -10)">
    <!-- Shadow Offset Layer (Electric Cyan) -->
    <polygon points="175,85 395,85 245,255 415,255 135,455 215,285 115,285" 
             fill="#00D4FF" 
             stroke="#080808" 
             stroke-width="12" 
             stroke-linejoin="miter"/>
             
    <!-- Main Layer (Burnt Orange) -->
    <polygon points="160,70 380,70 230,240 400,240 120,440 200,270 100,270" 
             fill="#FF5C00" 
             stroke="#080808" 
             stroke-width="12" 
             stroke-linejoin="miter"/>
             
    <!-- Inner Accent Line (Gives it high-end detail) -->
    <polyline points="190,95 345,95 245,210" 
              fill="none" 
              stroke="#FFF" 
              stroke-width="6" 
              stroke-linecap="square" 
              opacity="0.85"/>
  </g>
</svg>
