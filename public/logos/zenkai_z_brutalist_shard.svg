<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="512" height="512" rx="32" fill="#080808"/>
  
  <!-- Subtle Grid Texture -->
  <defs>
    <pattern id="brutalist-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="none"/>
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#111" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#brutalist-grid)" rx="32"/>

  <!-- Shard Group with Neubrutalist Offset Shadow -->
  <g transform="translate(10, 10)">
    <!-- Shadow offset plane -->
    <g fill="#161616" opacity="0.5">
      <polygon points="130,130 402,130 332,200 130,200" />
      <polygon points="315,215 185,315 245,315 375,215" />
      <polygon points="200,330 402,330 402,400 130,400" />
    </g>

    <!-- Top Shard (Burnt Orange) -->
    <polygon points="120,120 392,120 322,190 120,190" 
             fill="#FF5C00" 
             stroke="#080808" 
             stroke-width="12" 
             stroke-linejoin="miter" />

    <!-- Diagonal Shard (Electric Cyan) -->
    <polygon points="305,205 175,305 235,305 365,205" 
             fill="#00D4FF" 
             stroke="#080808" 
             stroke-width="12" 
             stroke-linejoin="miter" />

    <!-- Bottom Shard (Acid Lime) -->
    <polygon points="190,320 392,320 392,390 120,390" 
             fill="#B5FF2D" 
             stroke="#080808" 
             stroke-width="12" 
             stroke-linejoin="miter" />
  </g>
</svg>
